name: Validate Pull Request Domain Ownership

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'domains/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  validate-ownership:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0 

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Process, Verify Ownership, and Label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          cat << 'EOF' > verify-ownership.js
          const { execSync } = require('child_process');
          const fs = require('fs');

          const prNum = process.env.PR_NUMBER;
          const prAuthor = process.env.PR_AUTHOR;
          const maintainer = 's8rr';

          const addLabel = (label) => { try { execSync(`gh pr edit ${prNum} --add-label "${label}"`); } catch(e) {} };
          const closePR = () => { try { execSync(`gh pr close ${prNum}`); } catch(e) {} };
          const addComment = (message) => { try { execSync(`gh pr comment ${prNum} --body "${message}"`); } catch(e) {} };

          try {
            const labels = execSync(`gh pr view ${prNum} --json labels --jq '.labels[].name'`).toString().split('\n');

            if (labels.includes('bypass')) {
                console.log('✅ Bypass detected.');
                process.exit(0);
            }

            if (labels.includes('draft')) {
                console.log('⚠️ Draft detected. Closing.');
                addComment(`🚧 **Status: Draft**\n\nThis PR is marked as a draft. Closing until ready.`);
                closePR();
                process.exit(0);
            }

            execSync('git fetch origin main');
            const getFiles = (filter) => {
              try {
                return execSync(`git diff --name-only --diff-filter=${filter} origin/main HEAD`)
                  .toString().trim().split('\n').filter(Boolean);
              } catch(e) { return []; }
            };

            const isDomainFile = f => f.includes('domains/') && f.endsWith('.json') && !f.endsWith('example.json');
            const existingDomainsChanged = [...getFiles('M'), ...getFiles('D')].filter(isDomainFile);

            let ownershipViolation = false;
            let violatedFile = '';
            let trueOwner = '';
            let errorType = '';

            for (const file of existingDomainsChanged) {
              try {
                const originalContent = execSync(`git show origin/main:${file}`).toString();
                const originalJson = JSON.parse(originalContent);
                
                if (originalJson.owner && originalJson.owner.toLowerCase() !== prAuthor.toLowerCase()) {
                  ownershipViolation = true;
                  violatedFile = file;
                  trueOwner = originalJson.owner;
                  errorType = 'unauthorized';
                  break; 
                }
              } catch (err) {
                ownershipViolation = true;
                violatedFile = file;
                trueOwner = "Unknown";
                errorType = 'malformed';
                break;
              }
            }

            if (ownershipViolation) {
              console.log(`❌ Invalid Record Detected: ${violatedFile}`);
              addLabel('Rejected');
              addLabel('Invalid Record');

              const reason = errorType === 'malformed' 
                ? "The JSON structure is malformed or invalid." 
                : `You are attempting to modify a record that belongs to @${trueOwner}.`;

              const message = `🛑 **Domain Record Invalid**\n\n` +
                              `The file \`${violatedFile}\` failed validation checks.\n\n` +
                              `**Reason:** ${reason}\n\n` +
                              `CC: @${maintainer} — Closing this PR. Please ensure you are only modifying your own records and using valid JSON syntax.`;
              
              addComment(message);
              closePR();
              process.exit(1);
            }

            if (getFiles('A').filter(isDomainFile).length > 0) addLabel('type: new-domain');
            if (existingDomainsChanged.length > 0) addLabel('type: domain-update');

            console.log('✅ Verification passed.');
          } catch (error) {
            console.error('System error:', error.message);
            process.exit(1);
          }
          EOF
          node verify-ownership.js
