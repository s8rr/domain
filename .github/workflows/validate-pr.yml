name: Validate Pull Request Domain Ownership

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'domains/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  validate-ownership:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 2 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install 

      - name: Process, Validate, and Label Pull Request
        env:
          PR_ACTOR: ${{ github.event.pull_request.user.login }}
          ADMIN_USER: "s8rr"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node -e "
          const { execSync } = require('child_process');
          const path = require('path');
          
          const actor = process.env.PR_ACTOR;
          const admin = process.env.ADMIN_USER;
          const prNum = process.env.PR_NUMBER;
          
          const addLabel = (label) => {
            try { execSync('gh pr edit ' + prNum + ' --add-label \"' + label + '\"'); } catch(e) {}
          };
          const removeLabel = (label) => {
            try { execSync('gh pr edit ' + prNum + ' --remove-label \"' + label + '\"'); } catch(e) {}
          };

          try {
            // Helper to get files by Git diff filter and remove empty lines
            const getFiles = (filter) => {
              try {
                return execSync('git diff --name-only --diff-filter=' + filter + ' HEAD^1 HEAD')
                  .toString().trim().split('\n').filter(Boolean);
              } catch(e) { return []; }
            };

            const addedFiles = getFiles('A');
            const modifiedFiles = getFiles('M');
            const deletedFiles = getFiles('D');
            
            const isDomainFile = f => f.includes('domains/') && f.endsWith('.json') && !f.endsWith('example.json');
            
            const newDomains = addedFiles.filter(isDomainFile);
            const existingDomainsChanged = [...modifiedFiles, ...deletedFiles].filter(isDomainFile);
            
            if (newDomains.length > 0) addLabel('type: new-domain');
            if (existingDomainsChanged.length > 0) addLabel('type: domain-update');

            if (actor === admin) {
              console.log('👑 Admin bypass verified.');
              addLabel('status: valid');
              addLabel('ownership: verified');
              process.exit(0);
            }

            if (newDomains.length === 0 && existingDomainsChanged.length === 0) {
              console.log('No domain files modified.');
              process.exit(0);
            }

            // 🛡️ OWNERSHIP CHECK: ONLY applies to files that are being edited or deleted
            existingDomainsChanged.forEach(filePath => {
              const fileName = path.basename(filePath);
              const cleanName = fileName.replace('.json', '');
              const parts = cleanName.split('.');
              const fileOwner = parts[parts.length - 1].toLowerCase().trim();

              if (fileOwner !== actor.toLowerCase()) {
                throw new Error('User ' + actor + ' is unauthorized to edit or delete records belonging to ' + fileOwner);
              }
            });

            console.log('✅ Validation successful.');
            removeLabel('status: invalid');
            removeLabel('ownership: unauthorized');
            
            addLabel('status: valid');
            addLabel('ownership: verified');
            
          } catch (error) {
            console.error('❌ VALIDATION FAILURE:', error.message);
            removeLabel('status: valid');
            removeLabel('ownership: verified');
            
            addLabel('status: invalid');
            addLabel('ownership: unauthorized');
            process.exit(1);
          }
          "
