name: Validate Domain Registry
on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-assign PR to Owner
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [context.repo.owner]
            })

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 🚀 Upgraded to Node 24 to resolve the GitHub deprecation notice

      - name: Fetch Remote Base Branch
        run: git fetch origin main

      - name: Install Linting Packages
        run: npm install

      - name: Run Core Code Validator
        run: npm run validate
        env:
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Compile JSON Registry Index
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const domainsDir = path.join(process.cwd(), 'domains');
          
          if (!fs.existsSync(domainsDir)) {
            console.error('❌ Error: domains folder missing.');
            process.exit(1);
          }
          
          const files = fs.readdirSync(domainsDir);
          const result = [];
          
          files.forEach(f => {
            if(f.endsWith('.json') && f !== 'example.json') {
              try {
                const data = JSON.parse(fs.readFileSync(path.join(domainsDir, f), 'utf8'));
                if (data.records) {
                  const calculatedSubdomain = f.substring(0, f.lastIndexOf('.json')).toLowerCase().trim();
                  result.push({ 
                    subdomain: calculatedSubdomain, 
                    records: data.records 
                  });
                }
              } catch(err) {
                console.error('Malformed file skipped: ' + f);
              }
            }
          });
          
          fs.writeFileSync('dist-domains.json', JSON.stringify(result, null, 2));
          console.log('✅ Validation passed! Ready for manual merge.');
          "

      - name: Post Error Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const errorFile = 'validation_error.txt';
            
            if (fs.existsSync(errorFile)) {
              const errorBody = fs.readFileSync(errorFile, 'utf8');
              
              const commentHeader = `### ⚠️ Domain Registry Validation Failed`;
              const commentBody = `${commentHeader}\n\nHi @${context.actor}, your pull request contains validation errors:\n\n> ${errorBody}\n\nPlease fix this error and push the update to your branch to re-trigger checks.`;
              
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const existingComment = comments.data.find(c => 
                c.user.login === 'github-actions[bot]' && c.body.includes(commentHeader)
              );
              
              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: commentBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: commentBody
                });
              }
            }
