name: Validate Domain Registry
on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch Remote Base Branch
        run: git fetch origin main

      - name: Install Linting Packages
        run: npm install

      - name: Verify Record Ownership
        env:
          PR_ACTOR: ${{ github.actor }}
          ADMIN_USER: s8rr
        run: |
          node -e "
          const { execSync } = require('child_process');
          const path = require('path');

          const actor = process.env.PR_ACTOR.toLowerCase();
          const admin = process.env.ADMIN_USER.toLowerCase();

          if (actor === admin) {
            console.log('👑 Admin bypass verified.');
            process.exit(0);
          }

          let changedFiles = [];
          try {
            // Evaluates changes exclusively introduced by this pull request branch against main
            const output = execSync('git diff --name-only origin/main...HEAD', { encoding: 'utf8' });
            changedFiles = output.split('\n').filter(Boolean);
          } catch (e) {
            console.error('❌ Failed to accurately calculate git diff:', e.message);
            process.exit(1);
          }

          const isDomainFile = f => f.includes('domains/') && f.endsWith('.json') && !f.endsWith('example.json');
          const domainFiles = changedFiles.filter(isDomainFile);

          domainFiles.forEach(filePath => {
            const fileName = path.basename(filePath, '.json');
            const parts = fileName.split('.');
            const fileOwner = parts[parts.length - 1].toLowerCase().trim();

            if (fileOwner !== actor) {
              console.error('❌ VALIDATION FAILURE: User ' + process.env.PR_ACTOR + ' is unauthorized to modify records belonging to ' + fileOwner);
              process.exit(1);
            }
          });

          console.log('✅ Ownership validation successful.');
          "

      - name: Run Core Code Validator
        run: npm run validate
        env:
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Compile JSON Registry Index
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const domainsDir = path.join(process.cwd(), 'domains');
          
          if (!fs.existsSync(domainsDir)) {
            console.error('❌ Error: domains folder missing.');
            process.exit(1);
          }
          
          const files = fs.readdirSync(domainsDir);
          const result = [];
          
          files.forEach(f => {
            if(f.endsWith('.json') && f !== 'example.json') {
              try {
                const data = JSON.parse(fs.readFileSync(path.join(domainsDir, f), 'utf8'));
                if (data.records) {
                  const calculatedSubdomain = f.substring(0, f.lastIndexOf('.json')).toLowerCase().trim();
                  result.push({ 
                    subdomain: calculatedSubdomain, 
                    records: data.records 
                  });
                }
              } catch(err) {
                console.error('Malformed file skipped: ' + f);
              }
            }
          });
          
          fs.writeFileSync('dist-domains.json', JSON.stringify(result, null, 2));
          console.log('✅ Validation passed! Ready for manual merge.');
          "
