name: Validate Domain Registry
on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linting Packages
        run: npm install

      - name: Run Core Code Validator
        run: npm run validate
        env:
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Compile JSON Registry Index
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const domainsDir = path.join(process.cwd(), 'domains');
          if (!fs.existsSync(domainsDir)) process.exit(1);
          const files = fs.readdirSync(domainsDir);
          const result = files
            .filter(f => f.endsWith('.json') && f !== 'example.json')
            .map(f => ({ subdomain: f.replace('.json', '').toLowerCase(), records: JSON.parse(fs.readFileSync(path.join(domainsDir, f), 'utf8')).records }));
          fs.writeFileSync('dist-domains.json', JSON.stringify(result, null, 2));
          "

      - name: Validate Secret and Create creds.json
        env:
          CF_TOKEN: ${{ secrets.DOMAIN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::Secret 'DOMAIN' is empty or not accessible!"
            exit 1
          fi
          echo '{"cloudflare": {"TYPE": "CLOUDFLAREAPI", "apitoken": "'"$CF_TOKEN"'"}}' > creds.json

      - name: Install DNSControl
        uses: gacts/install-dnscontrol@v1

      - name: DNSControl Lint & Preview Simulation
        run: dnscontrol preview
