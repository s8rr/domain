name: Core Domain Validator

on:
  pull_request_target:
    branches: [ main ]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: write 
  issues: write        

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch Target Branch for Diffing
        run: git fetch origin main:origin/main

      - name: Check for Bypass or Draft Labels
        id: check-labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (labels.includes('bypass')) {
              console.log('Bypass detected. Exiting.');
              process.exit(0); 
            }
            if (labels.includes('draft')) {
              console.log('Draft detected. Posting comment.');
              await github.rest.issues.createComment({ 
                ...context.repo, 
                issue_number: context.issue.number, 
                body: '🚧 PR marked as draft. Validation skipped.' 
              });
              process.exit(1); 
            }

      - name: Extract PR File Diffs
        run: node util/get-pr-files.js

      - name: Run Validation Tests
        id: validation
        run: npm run validate
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_ID: ${{ github.event.pull_request.user.id }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}

      - name: Handle Ownership Status
        if: always() && steps.check-labels.outcome != 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const isSuccess = "${{ steps.validation.outcome }}" === "success";
            const prNumber = context.issue.number;

            if (isSuccess) {
              await github.rest.issues.removeLabel({ ...context.repo, issue_number: prNumber, name: 'ownership: unauthorized' }).catch(() => {});
              await github.rest.issues.addLabels({ ...context.repo, issue_number: prNumber, labels: ['ownership: verified'] });
            } else {
              await github.rest.issues.removeLabel({ ...context.repo, issue_number: prNumber, name: 'ownership: verified' }).catch(() => {});
              await github.rest.issues.addLabels({ ...context.repo, issue_number: prNumber, labels: ['ownership: unauthorized'] });
              
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body: '@s8rr This PR has failed validation and has been marked as ownership: unauthorized. Please review.'
              });
            }
