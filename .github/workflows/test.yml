name: Core Domain Validator

on:
  pull_request_target:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # pull_request_target runs in the context of the main branch,
          # so we explicitly fetch the PR branch depth to run accurate diffs
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch Target Branch for Diffing
        run: |
          git fetch origin main:origin/main

      - name: Extract PR File Diffs
        run: node util/get-pr-files.js

      - name: Run Validation Tests
        run: npx ava
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_ID: ${{ github.event.pull_request.user.id }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
