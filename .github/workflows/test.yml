name: Core Domain Validator

on:
  pull_request_target:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write # Required for labels and closing
  issues: write        # Required for posting comments

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch Target Branch for Diffing
        run: |
          git fetch origin main:origin/main

      - name: Extract PR File Diffs
        run: node util/get-pr-files.js

      - name: Run Validation Tests
        id: validation
        run: npm run validate
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_ID: ${{ github.event.pull_request.user.id }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}

      - name: Handle Ownership Status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const isSuccess = "${{ steps.validation.outcome }}" === "success";
            const prNumber = context.issue.number;

            if (isSuccess) {
              // Handle Verified
              await github.rest.issues.removeLabel({ ...context.repo, issue_number: prNumber, name: 'ownership: unauthorized' }).catch(() => {});
              await github.rest.issues.addLabels({ ...context.repo, issue_number: prNumber, labels: ['ownership: verified'] });
            } else {
              // Handle Unauthorized
              await github.rest.issues.removeLabel({ ...context.repo, issue_number: prNumber, name: 'ownership: verified' }).catch(() => {});
              await github.rest.issues.addLabels({ ...context.repo, issue_number: prNumber, labels: ['ownership: unauthorized'] });
              
              // Tag s8rr and close the PR
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body: '@s8rr This PR has failed validation and has been marked as ownership: unauthorized. Please review.'
              });
              
              await github.rest.pulls.update({
                ...context.repo,
                pull_number: prNumber,
                state: 'closed'
              });
            }
