name: Deploy Live Records
on:
  push:
    branches: [main]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Production Code
        uses: actions/checkout@v4

      - name: Compile JSON Registry Index
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const domainsDir = path.join(process.cwd(), 'domains');
          
          console.log('🔍 Checking path location:', domainsDir);
          
          if (!fs.existsSync(domainsDir)) {
            console.error('❌ Error: domains folder does not exist at path root location.');
            process.exit(1);
          }
          
          const files = fs.readdirSync(domainsDir);
          console.log('📂 Files found in directory:', files);
          
          const result = [];
          
          files.forEach(f => {
            if(f.endsWith('.json') && f !== 'example.json') {
              try {
                const fullPath = path.join(domainsDir, f);
                const rawData = fs.readFileSync(fullPath, 'utf8');
                const data = JSON.parse(rawData);
                
                console.log('📄 Processing file: ' + f + ' | Records found: ' + (data.records ? 'YES' : 'NO'));
                
                if (data.records) {
                  result.push({ 
                    subdomain: f.replace('.json', '').toLowerCase().trim(), 
                    records: data.records 
                  });
                }
              } catch(err) {
                console.error('❌ Malformed JSON syntax error in file: ' + f, err);
              }
            }
          });
          
          fs.writeFileSync('./dist-domains.json', JSON.stringify(result, null, 2));
          console.log('🎉 Successfully saved dist-domains.json with ' + result.length + ' user entries.');
          "

      - name: Create Production Credentials
        run: |
          echo '{
            "cloudflare": {
              "TYPE": "CLOUDFLAREAPI",
              "apitoken": "'"$CLOUDFLARE_API_TOKEN"'"
            }
          }' > creds.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.DOMAIN }}

      - name: Install DNSControl
        uses: gacts/install-dnscontrol@v1

      - name: Push Records Live to Cloudflare
        run: dnscontrol push
