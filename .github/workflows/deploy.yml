name: Deploy Live Records
on:
  push:
    branches: [main]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Production Code
        uses: actions/checkout@v4

      - name: Compile JSON Registry Index
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const domainsDir = path.join(process.cwd(), 'domains');
          
          if (!fs.existsSync(domainsDir)) {
            console.error('❌ Error: domains folder missing.');
            process.exit(1);
          }
          
          const targetedDomains = ['akjon.dev', 'code-space.me', 'id-card.me'];
          const result = {};

          targetedDomains.forEach(domain => {
            result[domain] = [];
            const dirPath = path.join(domainsDir, domain);
            if (fs.existsSync(dirPath)) {
              const files = fs.readdirSync(dirPath);
              files.forEach(f => {
                if (f.endsWith('.json') && f !== 'example.json') {
                  try {
                    const content = JSON.parse(fs.readFileSync(path.join(dirPath, f), 'utf8'));
                    if (content.records) {
                      result[domain].push({
                        subdomain: f.replace('.json', '').toLowerCase().trim(),
                        records: content.records
                      });
                    }
                  } catch (e) {
                    console.error('Malformed file skipped under ' + domain + ': ' + f);
                  }
                }
              });
            }
          });

          fs.writeFileSync('./dist-domains.json', JSON.stringify(result, null, 2));
          console.log('✅ Successfully compiled multi-domain registry index.');
          "

      - name: Create Production Credentials
        env:
          CF_SECRET: ${{ secrets.DOMAIN }}
          CF_VAR: ${{ vars.DOMAIN }}
        run: |
          # Fallback check: attempts to pull from Secrets first, then checks Variables
          CLOUDFLARE_API_TOKEN="${CF_SECRET:-$CF_VAR}"
          
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Could not find your API key! Ensure 'DOMAIN' is set under either Actions Secrets or Actions Variables."
            exit 1
          fi
          
          echo '{
            "cloudflare": {
              "TYPE": "CLOUDFLAREAPI",
              "apitoken": "'"$CLOUDFLARE_API_TOKEN"'"
            }
          }' > creds.json

      - name: Install DNSControl
        uses: gacts/install-dnscontrol@v1

      - name: Push Records Live to Cloudflare
        run: dnscontrol push
