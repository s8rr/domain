name: Deploy Live Records
on:
  push:
    branches: [main]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Production Code
        uses: actions/checkout@v4

      - name: Compile JSON Registry Index
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const domainsDir = path.join(process.cwd(), 'domains');
          
          if (!fs.existsSync(domainsDir)) {
            console.error('❌ Error: domains folder missing.');
            process.exit(1);
          }
          
          const files = fs.readdirSync(domainsDir);
          const result = [];
          
          files.forEach(f => {
            if(f.endsWith('.json') && f !== 'example.json') {
              try {
                const data = JSON.parse(fs.readFileSync(path.join(domainsDir, f), 'utf8'));
                if (data.records) {
                  // Extracts full nested subdomain handling dots (e.g. '_vercel.example.json' -> '_vercel.example')
                  const calculatedSubdomain = f.substring(0, f.lastIndexOf('.json')).toLowerCase().trim();
                  
                  result.push({ 
                    subdomain: calculatedSubdomain, 
                    records: data.records 
                  });
                }
              } catch(err) {
                console.error('Malformed file skipped: ' + f);
              }
            }
          });
          
          fs.writeFileSync('./dist-domains.json', JSON.stringify(result, null, 2));
          console.log('✅ Compiled ' + result.length + ' structural record files.');
          "

      - name: Create Production Credentials
        env:
          CF_SECRET: ${{ secrets.DOMAIN }}
          CF_VAR: ${{ vars.DOMAIN }}
        run: |
          # Fallback check: attempts to pull from Secrets first, then checks Variables
          CLOUDFLARE_API_TOKEN="${CF_SECRET:-$CF_VAR}"
          
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Could not find your API key! Ensure 'DOMAIN' is set under either Actions Secrets or Actions Variables."
            exit 1
          fi
          
          echo '{
            "cloudflare": {
              "TYPE": "CLOUDFLAREAPI",
              "apitoken": "'"$CLOUDFLARE_API_TOKEN"'"
            }
          }' > creds.json

      - name: Install DNSControl
        uses: gacts/install-dnscontrol@v1

      - name: Push Records Live to Cloudflare
        run: dnscontrol push
